<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>in3pida Monitoring — Nuova password</title>
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <div class="login-logo">
                <img src="images/logo.png" alt="in3pida">
            </div>
            <div class="login-title">Nuova password</div>
            <div class="login-sub">Scegli una nuova password per il tuo account</div>

            <div id="msg-error"   class="login-msg login-msg-error"   style="display:none"></div>
            <div id="msg-success" class="login-msg login-msg-success" style="display:none"></div>

            <form id="reset-form">
                <div class="form-group">
                    <label class="form-label" for="password">Nuova password</label>
                    <input type="password" class="form-input" id="password" placeholder="Almeno 6 caratteri" autocomplete="new-password" required minlength="6">
                </div>
                <div class="form-group">
                    <label class="form-label" for="confirm">Conferma password</label>
                    <input type="password" class="form-input" id="confirm" placeholder="Ripeti la password" autocomplete="new-password" required minlength="6">
                </div>
                <button class="btn-primary" type="submit" id="btn-reset">Salva password</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script>
    const _SB = window.supabase.createClient(
        'https://yyauvoqjdzrbmebeafit.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl5YXV2b3FqZHpyYm1lYmVhZml0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3OTM2MDAsImV4cCI6MjA5NTM2OTYwMH0.M6kD56PEO_UcJ68Vjquo03vuORjv62MflIzGLzYKN9w'
    );

    document.getElementById('reset-form').addEventListener('submit', async e => {
        e.preventDefault();
        const pw  = document.getElementById('password').value;
        const pw2 = document.getElementById('confirm').value;
        const btn = document.getElementById('btn-reset');
        document.getElementById('msg-error').style.display   = 'none';
        document.getElementById('msg-success').style.display = 'none';

        if (pw !== pw2) {
            const el = document.getElementById('msg-error');
            el.textContent = 'Le password non coincidono.'; el.style.display = 'block';
            return;
        }

        btn.textContent = '...'; btn.disabled = true;
        const { error } = await _SB.auth.updateUser({ password: pw });
        btn.textContent = 'Salva password'; btn.disabled = false;

        if (error) {
            const el = document.getElementById('msg-error');
            el.textContent = error.message; el.style.display = 'block';
        } else {
            await _SB.auth.signOut();
            window.location.href = 'login.html?reset=true';
        }
    });
    </script>
</body>
</html>
